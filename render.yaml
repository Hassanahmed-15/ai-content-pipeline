# Render Blueprint — one-click deploy of the AI Multi-Agent Content Pipeline.
# In the Render dashboard: New + > Blueprint > connect this repo.
# Render auto-detects this file. Set OPENAI_API_KEY in the dashboard (it is
# marked sync:false so it is NOT stored in git).
services:
  - type: web
    name: ai-content-pipeline
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: LLM_PROVIDER
        value: openai
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: OUTPUT_DIR
        value: /tmp/output
      - key: OPENAI_API_KEY
        sync: false   # set this secret in the Render dashboard, never in git
